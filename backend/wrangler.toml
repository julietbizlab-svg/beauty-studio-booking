name = "beauty-studio-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
STUDIO_NAME = "美業工作室"
TENANT_ID = "tenant_beauty_studio_default"
LOCATION_ID = "location_main"
STAFF_ID = "staff_owner"

[[d1_databases]]
binding = "DB"
database_name = "beauty-studio-booking-v2"
database_id = "58e5f639-221d-4b7e-bc74-27dc83664d43"
migrations_dir = "migrations"

[env.v2-test]
name = "beauty-studio-api-v2-test"

[env.v2-test.vars]
STUDIO_NAME = "美業工作室 v2 測試"
TENANT_ID = "tenant_beauty_studio_default"
LOCATION_ID = "location_main"
STAFF_ID = "staff_owner"
DATA_BACKEND = "d1"

[[env.v2-test.d1_databases]]
binding = "DB"
database_name = "beauty-studio-booking-v2"
database_id = "58e5f639-221d-4b7e-bc74-27dc83664d43"
migrations_dir = "migrations"

# 前後對比照片私有儲存（設定草稿）：
# bucket 尚未建立，deploy 前需先以 wrangler r2 bucket create 建立，
# 並保持 private（不開啟 public access、不設 custom domain）。
# 只綁在 env.v2-test，不影響頂層 Demo v1／Notion Worker。
[[env.v2-test.r2_buckets]]
binding = "PHOTO_BUCKET"
bucket_name = "beauty-studio-photos-v2"

# 正式環境設定草稿（僅本機設定，不新增 production deploy script、不執行 deploy）：
# 綁定既有 D1 beauty-studio-booking-v2 與既有 R2 beauty-studio-photos-v2，
# 非秘密 tenant／location／staff vars 與 v2-test 相同。
[env.v2-production]
name = "beauty-studio-api-v2-production"

[env.v2-production.vars]
STUDIO_NAME = "美業工作室 v2 測試"
TENANT_ID = "tenant_beauty_studio_default"
LOCATION_ID = "location_main"
STAFF_ID = "staff_owner"
DATA_BACKEND = "d1"

[[env.v2-production.d1_databases]]
binding = "DB"
database_name = "beauty-studio-booking-v2"
database_id = "58e5f639-221d-4b7e-bc74-27dc83664d43"
migrations_dir = "migrations"

[[env.v2-production.r2_buckets]]
binding = "PHOTO_BUCKET"
bucket_name = "beauty-studio-photos-v2"
