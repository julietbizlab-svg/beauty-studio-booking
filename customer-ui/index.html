<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>線上預約</title>
  <link rel="stylesheet" href="css/style.css?v=20260713001">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="brand" id="brand">美業工作室</h1>
      <p class="subtitle">線上預約</p>
    </header>

    <div class="user-bar">
      <img id="user-avatar" src="" alt="" style="display:none">
      <span id="user-name"></span>
    </div>

    <div class="announcement" id="announcement" style="display:none"></div>

    <div class="tabs">
      <button type="button" class="tab active" data-tab="book">預約</button>
      <button type="button" class="tab" data-tab="bookings">我的預約</button>
    </div>

    <div id="status" class="status" style="display:none"></div>

    <section class="panel active" data-panel="book">
      <p class="step-hint">步驟 1：選擇服務項目</p>
      <div id="service-list"></div>

      <p class="step-hint">步驟 2：選擇日期</p>
      <label for="date-input">預約日期</label>
      <input type="date" id="date-input">

      <p class="step-hint">步驟 3：選擇時段</p>
      <div class="slot-grid" id="slot-grid">
        <div class="empty">請先選擇服務與日期</div>
      </div>

      <button type="button" class="btn btn-primary" id="book-btn" disabled>確認預約</button>
    </section>

    <section class="panel" data-panel="bookings">
      <div id="booking-list"></div>
    </section>
  </div>

  <script src="js/config.js?v=20260713001"></script>
  <script src="js/liff-init.js?v=20260713001"></script>
  <script src="js/api.js?v=20260713001"></script>
  <script src="js/app.js?v=20260713001"></script>
</body>
</html>
