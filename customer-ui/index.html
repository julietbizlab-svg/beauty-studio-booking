<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>線上預約</title>
  <link rel="stylesheet" href="css/style.css?v=20260722001">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="brand" id="brand">美業工作室</h1>
      <p class="subtitle">線上預約</p>
    </header>

    <div class="user-bar">
      <img id="user-avatar" src="" alt="" style="display:none">
      <span id="user-name"></span>
    </div>

    <div class="announcement" id="announcement" style="display:none"></div>

    <div class="tabs">
      <button type="button" class="tab active" data-tab="book">預約</button>
      <button type="button" class="tab" data-tab="bookings">我的預約</button>
    </div>

    <div id="status" class="status" style="display:none"></div>

    <section class="panel active" data-panel="book">
      <p class="step-hint">步驟 1：選擇服務項目</p>
      <div id="service-list"></div>

      <p class="step-hint">步驟 2：選擇日期</p>
      <div id="calendar-section" class="calendar-section" hidden>
        <div class="calendar-toolbar">
          <button type="button" class="btn btn-small" id="calendar-prev" aria-label="上個月">◀</button>
          <span class="calendar-month-label" id="calendar-month-label"></span>
          <button type="button" class="btn btn-small" id="calendar-next" aria-label="下個月">▶</button>
          <button type="button" class="btn btn-small" id="calendar-today-btn">今天</button>
        </div>
        <div class="calendar-weekdays" aria-hidden="true">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <p class="booking-notice-hint" id="booking-notice-hint" hidden></p>
        <p class="selected-date-summary" id="selected-date-summary"></p>
      </div>
      <div id="calendar-placeholder" class="empty">請先選擇服務</div>

      <p class="step-hint">步驟 3：選擇時段</p>
      <div class="slot-grid" id="slot-grid">
        <div class="empty">請先選擇服務與日期</div>
      </div>

      <p class="step-hint">步驟 4：填寫聯絡資料</p>
      <div class="customer-profile-form" id="customer-profile-form">
        <p class="profile-locked-hint" id="profile-locked-hint" hidden>
          姓名、電話與生日已建檔，如需修改請聯絡店家
        </p>
        <div class="form-group">
          <label for="customer-name">姓名（必填）</label>
          <input type="text" id="customer-name" name="customer-name" autocomplete="name" placeholder="請填真實姓名" maxlength="40">
        </div>
        <div class="form-group">
          <label for="customer-phone">電話（必填）</label>
          <input type="tel" id="customer-phone" name="customer-phone" autocomplete="tel" inputmode="tel" placeholder="例：0912345678" maxlength="20">
        </div>
        <div class="form-group">
          <label for="customer-birthday">生日（選填）</label>
          <input type="date" id="customer-birthday" name="customer-birthday">
        </div>
      </div>

      <button type="button" class="btn btn-primary" id="book-btn" disabled>確認預約</button>
    </section>

    <section class="panel" data-panel="bookings">
      <div id="deposit-transfer-box" class="deposit-transfer-box" hidden></div>
      <div id="booking-list"></div>
    </section>
  </div>

  <div id="claim-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="claim-title">
    <div class="modal-card claim-card">
      <h2 id="claim-title">綁定 LINE 會員資料</h2>
      <div id="claim-body" class="claim-body">
        <p>店家邀請您將這個 LINE 帳號與您的客戶資料完成綁定。</p>
        <p class="claim-hint">綁定後即可直接查看與預約，無需重新填寫資料。</p>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-primary" id="claim-confirm-btn">確認綁定</button>
        <button type="button" class="btn btn-secondary" id="claim-dismiss-btn">先不要</button>
      </div>
    </div>
  </div>

  <div id="booking-success-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="booking-success-title">
    <div class="modal-card booking-success-card">
      <div class="booking-success-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="72" height="72" focusable="false">
          <circle cx="32" cy="32" r="30" fill="#E8F5EC"></circle>
          <path d="M18 33.5 L27.5 43 L46 22" fill="none" stroke="#5C9E6E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <h2 id="booking-success-title">預約成功</h2>
      <p class="booking-success-lead">您的預約已完成，請確認以下資訊。</p>
      <dl class="booking-success-details">
        <div>
          <dt>客人姓名</dt>
          <dd id="booking-success-name"></dd>
        </div>
        <div>
          <dt>服務項目</dt>
          <dd id="booking-success-service"></dd>
        </div>
        <div>
          <dt>預約日期</dt>
          <dd id="booking-success-date"></dd>
        </div>
        <div>
          <dt>預約時段</dt>
          <dd id="booking-success-time"></dd>
        </div>
      </dl>
      <div id="booking-success-deposit" class="deposit-transfer-box booking-success-deposit" hidden></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-primary" id="booking-success-view">查看我的預約</button>
        <button type="button" class="btn btn-secondary" id="booking-success-again">再預約一筆</button>
      </div>
    </div>
  </div>

  <div id="booking-fail-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="booking-fail-title">
    <div class="modal-card booking-fail-card">
      <div class="booking-fail-icon" aria-hidden="true">!</div>
      <h2 id="booking-fail-title">預約沒有成功</h2>
      <div id="booking-fail-body" class="booking-fail-body"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-primary btn-fail-ack" id="booking-fail-ack">我知道了</button>
      </div>
    </div>
  </div>

  <div id="cancel-confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="cancel-confirm-title">
    <div class="modal-card cancel-confirm-card">
      <div class="cancel-confirm-icon" aria-hidden="true">!</div>
      <h2 id="cancel-confirm-title">確認取消預約？</h2>
      <p class="cancel-confirm-body" id="cancel-confirm-body">取消後這個時段會釋出，若要重新預約需重新選擇服務與時段。</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-primary btn-cancel-confirm" id="cancel-confirm-yes">確認取消</button>
        <button type="button" class="btn btn-secondary" id="cancel-confirm-no">先不要取消</button>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=20260722001"></script>
  <script src="js/liff-init.js?v=20260722001"></script>
  <script src="js/api.js?v=20260722001"></script>
  <script src="js/app.js?v=20260722001"></script>
</body>
</html>
