<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查詢我的 LINE ID</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }
    .id-box {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      word-break: break-all;
      font-family: monospace;
      margin: 16px 0;
    }
    .hint { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>我的 LINE userId</h1>
  <p class="hint">此 ID 用於設定業主權限（OWNER_LINE_USER_IDS）</p>
  <div class="id-box" id="user-id">登入中…</div>
  <p class="hint" id="name"></p>

  <script src="js/config.js?v=20260712002"></script>
  <script src="js/liff-init.js?v=20260712002"></script>
  <script>
    window.beautyLiffReady.then(function () {
      var user = window.beautyUser;
      document.getElementById("user-id").textContent = user ? user.userId : "無法取得";
      document.getElementById("name").textContent = user ? user.displayName : "";
    }).catch(function (e) {
      document.getElementById("user-id").textContent = e.message;
    });
  </script>
</body>
</html>
