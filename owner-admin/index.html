<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>工作室管理</title>
  <link rel="stylesheet" href="css/style.css?v=20260718001">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="brand" id="brand">工作室管理</h1>
    </header>

    <div id="status" class="status hidden"></div>

    <div class="tabs">
      <button type="button" class="tab active" data-tab="today">預約查詢</button>
      <button type="button" class="tab" data-tab="customers">客戶資料</button>
      <button type="button" class="tab" data-tab="services">服務項目</button>
      <button type="button" class="tab" data-tab="slots">營業時段</button>
      <button type="button" class="tab" data-tab="settings">店面設定</button>
    </div>

    <!-- 預約查詢（月曆） -->
    <section class="panel active" data-panel="today">
      <p class="panel-hint">點選日期查看當日預約；有已確認預約的日期會顯示標記。</p>
      <div class="calendar-toolbar">
        <button type="button" class="btn btn-small" id="calendar-prev" aria-label="上個月">◀</button>
        <span class="calendar-month-label" id="calendar-month-label"></span>
        <button type="button" class="btn btn-small" id="calendar-next" aria-label="下個月">▶</button>
        <button type="button" class="btn btn-small" id="booking-today-btn">今天</button>
      </div>
      <div class="calendar-weekdays" aria-hidden="true">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <p class="booking-date-summary" id="booking-date-summary"></p>
      <button type="button" class="btn btn-small" id="refresh-today" style="margin-bottom:12px">重新整理</button>
      <div id="today-list"></div>
    </section>

    <!-- 客戶資料 -->
    <section class="panel" data-panel="customers">
      <div id="customer-list-view">
        <p class="panel-hint">從預約紀錄整理客戶名單，可用姓名或電話搜尋。</p>
        <div class="customer-search-row">
          <input type="search" id="customer-search" placeholder="搜尋姓名或電話" enterkeyhint="search">
          <button type="button" class="btn btn-small" id="customer-search-btn">搜尋</button>
        </div>
        <div id="customer-list"></div>
      </div>
      <div id="customer-detail-view" class="hidden">
        <button type="button" class="btn btn-small" id="customer-back-btn">← 返回客戶名單</button>
        <div id="customer-detail-header" class="card customer-detail-header"></div>
        <h3 class="customer-history-title">歷史預約</h3>
        <div id="customer-booking-list"></div>
      </div>
    </section>

    <!-- 服務項目 -->
    <section class="panel" data-panel="services">
      <div class="card">
        <h3 id="svc-form-title">新增服務</h3>
        <div class="form-group">
          <label for="svc-name">服務名稱</label>
          <input type="text" id="svc-name" placeholder="例：臉部保養">
        </div>
        <div class="form-group">
          <label for="svc-duration">時長（分鐘）</label>
          <input type="number" id="svc-duration" value="60" min="15" step="15">
        </div>
        <div class="form-group">
          <label for="svc-price">價格（選填）</label>
          <input type="number" id="svc-price" placeholder="1200">
        </div>
        <div class="form-group">
          <label for="svc-desc">說明</label>
          <textarea id="svc-desc" placeholder="服務內容簡述"></textarea>
        </div>
        <div class="form-group">
          <label for="svc-sort">排序（越小越前面）</label>
          <input type="number" id="svc-sort" value="0">
        </div>
        <button type="button" class="btn btn-primary" id="svc-submit">新增服務</button>
        <button type="button" class="btn btn-small" id="cancel-edit" style="margin-top:8px;width:100%">清除表單</button>
      </div>
      <div id="service-list"></div>
    </section>

    <!-- 營業時段 -->
    <section class="panel" data-panel="slots">
      <p style="font-size:0.85rem;color:var(--muted);margin-top:0">
        設定每週固定營業時段。系統會依服務時長自動切分可預約時間。
      </p>
      <div id="slot-editor"></div>
      <button type="button" class="btn btn-primary" id="save-slots" style="margin-top:12px">儲存營業時段</button>
    </section>

    <!-- 店面設定 -->
    <section class="panel" data-panel="settings">
      <div class="form-group">
        <label for="brand-name">品牌名稱</label>
        <input type="text" id="brand-name" placeholder="例：花漾美甲工作室">
      </div>
      <div class="form-group">
        <label for="primary-color">主色（HEX）</label>
        <input type="text" id="primary-color" placeholder="#E8B4B8">
      </div>
      <div class="form-group">
        <label for="announcement">公告文字</label>
        <textarea id="announcement" placeholder="顯示在客人端首頁的公告"></textarea>
      </div>
      <div class="form-group">
        <label for="cancel-policy">取消規則</label>
        <textarea id="cancel-policy" placeholder="例：預約日前 24 小時可免費取消"></textarea>
      </div>

      <div class="settings-section deposit-settings">
        <h3 class="settings-section-title">訂金與轉帳資訊（可選）</h3>
        <p class="panel-hint">僅顯示給客人看，系統不代收款、不對帳。不是線上金流。</p>
        <div class="form-group form-group--switch">
          <label class="switch-label" for="deposit-enabled">
            <input type="checkbox" id="deposit-enabled">
            <span>是否收訂金</span>
          </label>
        </div>
        <div id="deposit-fields">
          <div class="form-group">
            <label for="deposit-amount">訂金金額（元）</label>
            <input type="number" id="deposit-amount" min="1" step="1" placeholder="例：500">
          </div>
          <div class="form-group">
            <label for="bank-name">銀行名稱</label>
            <input type="text" id="bank-name" placeholder="例：玉山銀行">
          </div>
          <div class="form-group">
            <label for="bank-code">銀行代碼</label>
            <input type="text" id="bank-code" placeholder="例：808" inputmode="numeric">
          </div>
          <div class="form-group">
            <label for="bank-account">帳號</label>
            <input type="text" id="bank-account" placeholder="匯款帳號" inputmode="numeric">
          </div>
          <div class="form-group">
            <label for="bank-account-name">戶名</label>
            <input type="text" id="bank-account-name" placeholder="帳戶戶名">
          </div>
          <div class="form-group">
            <label for="deposit-note">轉帳提醒文字</label>
            <textarea id="deposit-note" placeholder="例：請於 24 小時內轉帳並私訊姓名與預約時段"></textarea>
          </div>
        </div>
      </div>

      <button type="button" class="btn btn-primary" id="save-settings">儲存設定</button>
    </section>
  </div>

  <div id="owner-cancel-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="owner-cancel-title">
    <div class="modal-card">
      <h3 id="owner-cancel-title">取消客戶預約</h3>
      <p class="modal-booking-summary" id="owner-cancel-summary"></p>
      <p class="panel-hint">請選擇或填寫取消原因（必填）</p>
      <div class="form-group">
        <label for="owner-cancel-reason-preset">取消原因</label>
        <select id="owner-cancel-reason-preset">
          <option value="">請選擇</option>
          <option value="臨時店休">臨時店休</option>
          <option value="時段需調整">時段需調整</option>
          <option value="服務項目異動">服務項目異動</option>
          <option value="其他原因">其他原因</option>
        </select>
      </div>
      <div class="form-group" id="owner-cancel-other-wrap" hidden>
        <label for="owner-cancel-reason-other">請說明其他原因</label>
        <textarea id="owner-cancel-reason-other" rows="3" placeholder="請輸入取消原因"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-small" id="owner-cancel-dismiss">返回</button>
        <button type="button" class="btn btn-danger" id="owner-cancel-confirm">確認取消</button>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=20260718001"></script>
  <script src="js/liff-init.js?v=20260718001"></script>
  <script src="js/api.js?v=20260718001"></script>
  <script src="js/app.js?v=20260718001"></script>
</body>
</html>
