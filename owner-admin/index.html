<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>工作室管理</title>
  <link rel="stylesheet" href="css/style.css?v=20260714001">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="brand" id="brand">工作室管理</h1>
    </header>

    <div id="status" class="status hidden"></div>

    <div class="tabs">
      <button type="button" class="tab active" data-tab="today">預約查詢</button>
      <button type="button" class="tab" data-tab="services">服務項目</button>
      <button type="button" class="tab" data-tab="slots">營業時段</button>
      <button type="button" class="tab" data-tab="settings">店面設定</button>
    </div>

    <!-- 預約查詢（依日期） -->
    <section class="panel active" data-panel="today">
      <p class="panel-hint">選擇日期查看當日預約，不限今天。</p>
      <div class="booking-query-bar">
        <div class="form-group inline-date">
          <label for="today-date">查詢日期</label>
          <input type="date" id="today-date">
        </div>
        <button type="button" class="btn btn-small" id="booking-today-btn">今天</button>
      </div>
      <p class="booking-date-summary" id="booking-date-summary"></p>
      <button type="button" class="btn btn-small" id="refresh-today" style="margin-bottom:12px">重新整理</button>
      <div id="today-list"></div>
    </section>

    <!-- 服務項目 -->
    <section class="panel" data-panel="services">
      <div class="card">
        <h3 id="svc-form-title">新增服務</h3>
        <div class="form-group">
          <label for="svc-name">服務名稱</label>
          <input type="text" id="svc-name" placeholder="例：臉部保養">
        </div>
        <div class="form-group">
          <label for="svc-duration">時長（分鐘）</label>
          <input type="number" id="svc-duration" value="60" min="15" step="15">
        </div>
        <div class="form-group">
          <label for="svc-price">價格（選填）</label>
          <input type="number" id="svc-price" placeholder="1200">
        </div>
        <div class="form-group">
          <label for="svc-desc">說明</label>
          <textarea id="svc-desc" placeholder="服務內容簡述"></textarea>
        </div>
        <div class="form-group">
          <label for="svc-sort">排序（越小越前面）</label>
          <input type="number" id="svc-sort" value="0">
        </div>
        <button type="button" class="btn btn-primary" id="svc-submit">新增服務</button>
        <button type="button" class="btn btn-small" id="cancel-edit" style="margin-top:8px;width:100%">清除表單</button>
      </div>
      <div id="service-list"></div>
    </section>

    <!-- 營業時段 -->
    <section class="panel" data-panel="slots">
      <p style="font-size:0.85rem;color:var(--muted);margin-top:0">
        設定每週固定營業時段。系統會依服務時長自動切分可預約時間。
      </p>
      <div id="slot-editor"></div>
      <button type="button" class="btn btn-primary" id="save-slots" style="margin-top:12px">儲存營業時段</button>
    </section>

    <!-- 店面設定 -->
    <section class="panel" data-panel="settings">
      <div class="form-group">
        <label for="brand-name">品牌名稱</label>
        <input type="text" id="brand-name" placeholder="例：花漾美甲工作室">
      </div>
      <div class="form-group">
        <label for="primary-color">主色（HEX）</label>
        <input type="text" id="primary-color" placeholder="#E8B4B8">
      </div>
      <div class="form-group">
        <label for="announcement">公告文字</label>
        <textarea id="announcement" placeholder="顯示在客人端首頁的公告"></textarea>
      </div>
      <div class="form-group">
        <label for="cancel-policy">取消規則</label>
        <textarea id="cancel-policy" placeholder="例：預約日前 24 小時可免費取消"></textarea>
      </div>
      <button type="button" class="btn btn-primary" id="save-settings">儲存設定</button>
    </section>
  </div>

  <script src="js/config.js?v=20260714001"></script>
  <script src="js/liff-init.js?v=20260714001"></script>
  <script src="js/api.js?v=20260714001"></script>
  <script src="js/app.js?v=20260714001"></script>
</body>
</html>
